name: astrbot_plugin_bilibili_preview # 插件唯一识别名，以 astrbot_plugin_ 前缀开头
display_name: B站链接预览插件 # 用于展示的名字，可以是方便人类阅读的名字（需要版本 >= v4.5.0，低版本不会报错，请放心填写）
desc: B站链接预览插件。(只返回基础视频信息) # 插件简短描述
version: v1.0.1 # 插件版本号。格式：v1.1.1 或者 v1.1
author: AlienStar # 作者
repo: https://github.com/Alien-Star/astrbot_plugin_bilibili_preview # 插件的仓库地址

config:
  cache_enabled:
    type: bool
    default: true
    description: 是否启用缓存（减少重复请求）
  cache_ttl:
    type: int
    default: 3600
    description: 缓存时间（秒）
  enable_image_preview:
    type: bool
    default: true
    description: 是否返回封面图片（图文混排）
